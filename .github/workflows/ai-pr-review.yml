name: AI PR Reviewer

on:
  pull_request_target:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR Number to manually review'
        required: true
        type: string

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-Label, Assign & Request Copilot Review
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.inputs
              ? parseInt(context.payload.inputs.pr_number)
              : context.payload.pull_request?.number;

            if (!prNumber) {
              console.log("No PR number found. Skipping.");
              return;
            }

            const prInfo = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            const prUser = prInfo.data.user.login;
            const headRef = prInfo.data.head.ref;

            // ─── 1. Auto-Label ───
            const branchMatch = headRef.match(/^(\d+)-/);
            let labelsToAdd = new Set(["Gssoc 26", "gssoc:approved"]);

            if (branchMatch) {
              const issueNumber = parseInt(branchMatch[1]);
              try {
                const issue = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber
                });
                issue.data.labels.forEach(label => labelsToAdd.add(label.name));
              } catch (e) {
                console.log(`Could not fetch labels for issue #${issueNumber}`);
              }
            }

            // Also check PR body for "Fixes #N"
            const body = prInfo.data.body || "";
            const issueRegex = /(?:fix|fixes|fixed|close|closes|closed|resolve|resolves|resolved)\s+#(\d+)/gi;
            let match;
            while ((match = issueRegex.exec(body)) !== null) {
              const issueNumber = parseInt(match[1]);
              try {
                const issue = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber
                });
                issue.data.labels.forEach(label => labelsToAdd.add(label.name));
              } catch (e) {
                console.log(`Could not fetch labels for issue #${issueNumber}`);
              }
            }

            // Apply labels
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: Array.from(labelsToAdd)
            });

            // ─── 2. Auto-Assign ───
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              assignees: [prUser]
            });

            // ─── 3. Request Copilot Review (the correct way) ───
            try {
              // Request review from Copilot as a team reviewer
              // Copilot's slug is "copilot" in the org/repo review settings
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                reviewers: ["Ixotic27"]
              });
              console.log("Requested review from Ixotic27");
            } catch (e) {
              console.log("Could not request reviewer:", e.message);
            }

            console.log(`PR #${prNumber} labeled, assigned to ${prUser}, review requested`);

      - name: Security Scan & Auto-Approve
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.inputs
              ? parseInt(context.payload.inputs.pr_number)
              : context.payload.pull_request?.number;

            if (!prNumber) return;

            const prInfo = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            const prUser = prInfo.data.user.login;

            // Fetch diff
            const diffResponse = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              mediaType: { format: 'diff' }
            });

            const diff = typeof diffResponse.data === 'string' ? diffResponse.data : '';
            if (!diff || diff.length === 0) {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                body: '✅ **Auto Review: Approved** — Empty diff, nothing to review.',
                event: 'APPROVE'
              });
              return;
            }

            // Security patterns scan
            const suspiciousPatterns = [
              { regex: /eval\s*\(/, name: 'eval() usage' },
              { regex: /Function\s*\(/, name: 'Function() constructor' },
              { regex: /child_process|exec\s*\(|execSync/, name: 'shell command execution' },
              { regex: /process\.env\.\w+/, name: 'direct env access (review needed)' },
              { regex: /SUPABASE_SERVICE_ROLE|SECRET|PASSWORD|PRIVATE_KEY/, name: 'hardcoded secret/key reference' },
              { regex: /btoa|atob|Buffer\.from.*base64/, name: 'base64 encoding (potential obfuscation)' },
              { regex: /fetch\s*\(\s*['"`]http:/, name: 'insecure HTTP fetch' },
              { regex: /innerHTML\s*=/, name: 'innerHTML assignment (XSS risk)' },
              { regex: /document\.write/, name: 'document.write (XSS risk)' },
              { regex: /\.env\.local|\.env\.production/, name: 'env file reference' },
            ];

            const findings = [];
            const addedLines = diff.split('\n').filter(l => l.startsWith('+') && !l.startsWith('+++'));

            for (const pattern of suspiciousPatterns) {
              const matches = addedLines.filter(l => pattern.regex.test(l));
              if (matches.length > 0) {
                findings.push(`⚠️ **${pattern.name}** — found in ${matches.length} added line(s)`);
              }
            }

            if (findings.length > 0) {
              const body = `🔍 **Security Scan: Review Needed**\n\nThe following patterns were detected:\n\n${findings.join('\n')}\n\n> A maintainer should review these findings before merging.\n\nHey @${prUser}, please review these flagged items! 🛠️`;

              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                body: body,
                event: 'COMMENT'
              });
              console.log(`Security scan found ${findings.length} patterns.`);
            } else {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                body: '✅ **Security Scan: Approved**\n\nNo suspicious patterns detected.\n\n⭐ **If you enjoyed contributing, please consider starring the repository!**',
                event: 'APPROVE'
              });
              console.log("Security scan passed. Auto-approved.");
            }
