name: PR Label Closer & Reopener

on:
  pull_request_target:
    types: [labeled]

permissions:
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  close-and-reopen:
    name: Auto Close PR and Reopen Issue
    runs-on: ubuntu-latest
    if: github.event.label.name == 'invalid'

    steps:
      - name: Close invalid PR and Reopen Linked Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const prAuthor = pr.user.login;
            const prBody = pr.body ?? '';

            // 1. Fetch current labels on this PR
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber,
            });
            const labelNames = labels.map(l => l.name);
            const lacksVisuals = labelNames.includes('needs-visual-proof');

            // 2. Decide the close message & issue reopen reason
            let closeMessage = '';
            let reopenReason = '';

            if (lacksVisuals) {
              closeMessage = `👋 Hey @${prAuthor}!

              It looks like you forgot to train yourself and your AI to read the contribution rules—or even read the issue properly. Relevant visual proof (screenshots or videos) is explicitly required, not random unrelated screenshots.

              This PR is now closed. 🤖`;

              reopenReason = `It looks like the assignee forgot to train themselves and their AI to read the contribution rules—or even read the issue properly. Relevant visual proof is explicitly required.`;
            } else {
              closeMessage = `👋 Hey @${prAuthor}!

              This PR has been marked as **invalid** and is being closed. This is usually due to the assignee being unresponsive or failing to follow standard contribution guidelines.

              We appreciate your interest and hope to see higher quality contributions in the future.`;

              reopenReason = `The PR was marked as invalid due to the assignee being unresponsive or failing to follow standard contribution guidelines.`;
            }

            // 3. Comment on the PR and close it
            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber,
              body: closeMessage
            });

            await github.rest.pulls.update({
              owner, repo, pull_number: prNumber,
              state: 'closed'
            });

            core.info(`Closed PR #${prNumber} as invalid.`);

            // 4. Parse linked issue numbers from the PR body to reopen them
            const BLOCK_REGEX = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)(?:\s*(?:and|,)?\s*#\d+)+/gi;
            const issueNumbers = [];
            let blockMatch;
            while ((blockMatch = BLOCK_REGEX.exec(prBody)) !== null) {
              const numRegex = /#(\d+)/g;
              let numMatch;
              while ((numMatch = numRegex.exec(blockMatch[0])) !== null) {
                issueNumbers.push(parseInt(numMatch[1], 10));
              }
            }
            const uniqueIssueNumbers = [...new Set(issueNumbers)];

            for (const issueNumber of uniqueIssueNumbers) {
              try {
                // Reopen the issue
                await github.rest.issues.update({
                  owner, repo, issue_number: issueNumber,
                  state: 'open'
                });

                // Post a comment explaining why it was reopened
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: `🔄 **This issue has been reopened.**

                  The associated PR #${prNumber} by @${prAuthor} was closed and marked as invalid.

                  **Reason:** ${reopenReason}

                  This issue is now back in the pool and open for other contributors to claim! 🚀`
                });

                core.info(`Reopened linked issue #${issueNumber} and commented.`);
              } catch (err) {
                core.error(`Failed to reopen issue #${issueNumber}: ${err.message}`);
              }
            }
